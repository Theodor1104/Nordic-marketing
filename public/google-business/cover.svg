<svg width="1080" height="608" viewBox="0 0 1080 608" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2d3d"/>
      <stop offset="100%" style="stop-color:#091c28"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#2dd4bf"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="608" fill="url(#bgGrad)"/>

  <!-- Decorative glow circle -->
  <circle cx="850" cy="200" r="300" fill="url(#glowGrad)"/>

  <!-- Grid pattern subtle -->
  <g opacity="0.05">
    <line x1="0" y1="150" x2="1080" y2="150" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="300" x2="1080" y2="300" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="450" x2="1080" y2="450" stroke="#ffffff" stroke-width="1"/>
    <line x1="270" y1="0" x2="270" y2="608" stroke="#ffffff" stroke-width="1"/>
    <line x1="540" y1="0" x2="540" y2="608" stroke="#ffffff" stroke-width="1"/>
    <line x1="810" y1="0" x2="810" y2="608" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- Main text -->
  <text x="80" y="260" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="72" font-weight="800" fill="#ffffff">Nordic</text>
  <text x="80" y="340" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="72" font-weight="800" fill="url(#accentGrad)">Digital</text>

  <!-- Tagline -->
  <text x="80" y="420" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="24" font-weight="400" fill="#94a3b8">Hjemmesider &amp; App-udvikling</text>

  <!-- Accent line -->
  <rect x="80" y="460" width="120" height="4" rx="2" fill="url(#accentGrad)"/>

  <!-- Feature badges -->
  <g transform="translate(700, 350)">
    <!-- Badge 1 -->
    <rect x="0" y="0" width="140" height="50" rx="25" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="70" y="32" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ffffff">SEO Optimeret</text>

    <!-- Badge 2 -->
    <rect x="160" y="0" width="140" height="50" rx="25" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="230" y="32" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ffffff">Dansk Team</text>

    <!-- Badge 3 -->
    <rect x="80" y="70" width="140" height="50" rx="25" fill="rgba(20,184,166,0.2)" stroke="rgba(45,212,191,0.4)" stroke-width="1"/>
    <text x="150" y="102" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#2dd4bf">Apps &amp; Web</text>
  </g>

  <!-- Phone mockup hint -->
  <g transform="translate(900, 100)">
    <rect x="0" y="0" width="120" height="220" rx="20" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
    <rect x="35" y="10" width="50" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>
    <rect x="10" y="30" width="100" height="160" rx="4" fill="rgba(20,184,166,0.1)"/>
    <circle cx="60" cy="205" r="8" fill="rgba(255,255,255,0.1)"/>
  </g>
</svg>